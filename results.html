<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduGuide AI - Results</title>
    <meta name="description" content="Your multi-agent analysis results and personalized study plan." />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="flow flow--results">
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand brand--sidebar" href="/" aria-label="EduGuide AI Home">
          <span class="brand__mark" aria-hidden="true">✦</span>
          <span class="brand__name">EduGuide AI</span>
        </a>
        <div class="topbar__actions">
          <button class="btn btn--ghost" type="button" id="themeToggle" aria-label="Toggle theme">
            <span class="btn__icon" aria-hidden="true">🌙</span>
            <span class="btn__text">Theme</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container results-container">
      <header class="results-header">
        <div>
          <h1 class="results-title">Your Personalized Analysis</h1>
          <p class="results-subtitle">Generated by 5 specialized agents.</p>
        </div>
        <div class="results-actions">
          <button class="btn btn--ghost" type="button" id="shareBtn">Share</button>
          <button class="btn btn--ghost" type="button" id="printBtn">Print</button>
          <button class="btn btn--ghost" type="button" id="exportBtn">Export PDF</button>
          <a class="btn btn--primary" href="/form">Edit Profile</a>
        </div>
      </header>

      <nav class="tabs" aria-label="Results tabs">
        <button class="tab-btn is-active" type="button" data-tab="profile">Your Profile</button>
        <button class="tab-btn" type="button" data-tab="gaps">Skill Gaps</button>
        <button class="tab-btn" type="button" data-tab="resources">Resources</button>
        <button class="tab-btn" type="button" data-tab="plan">Study Plan</button>
        <button class="tab-btn" type="button" data-tab="career">Career Roadmap</button>
      </nav>

      <section class="tabs-content">
        <div class="tab-pane is-active" id="profile-tab">
          <div class="content-box" id="profileContent"></div>
        </div>

        <div class="tab-pane" id="gaps-tab">
          <div class="content-box" id="gapsContent"></div>
        </div>

        <div class="tab-pane" id="resources-tab">
          <div class="resource-section">
            <h2 class="section-title">📺 YouTube Videos</h2>
            <div class="resource-list" id="youtubeContent"></div>
          </div>
          <div class="resource-section">
            <h2 class="section-title">🎓 Certificate Courses</h2>
            <div class="resource-list" id="coursesContent"></div>
          </div>
          <div class="resource-section">
            <h2 class="section-title">📚 Books</h2>
            <div class="resource-list" id="booksContent"></div>
          </div>
          <div class="resource-section">
            <h2 class="section-title">🧩 Free Resources</h2>
            <div class="resource-list" id="freeContent"></div>
          </div>
        </div>

        <div class="tab-pane" id="plan-tab">
          <div class="content-box" id="planContent"></div>
          <div class="plan-actions">
            <button class="btn btn--ghost" type="button" id="downloadPlanBtn">Add to Calendar (ICS)</button>
          </div>
        </div>

        <div class="tab-pane" id="career-tab">
          <div class="content-box" id="careerContent"></div>
        </div>
      </section>

      <div class="system-note" id="systemNote" aria-live="polite"></div>
    </main>

    <script src="./js/results.js"></script>
  </body>
</html>
